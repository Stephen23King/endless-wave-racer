<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
 
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Encode+Sans+Condensed:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
 
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#001f5b">
<title>🌊 Endless Wave Racer</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #001f5b;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  #gameWrapper {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas { display: block; }

  #ui {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 16px 20px;
    padding-top: max(16px, env(safe-area-inset-top, 16px));
    color: white;
    font-size: clamp(14px, 4vw, 20px);
    font-weight: 700;
    text-shadow: 0 2px 8px rgba(0,0,0,0.9);
    pointer-events: none;
    z-index: 10;
    column-gap: 12px;
  }
 
  #scoreLabel {
    grid-column: 1;
    justify-self: start;
    min-width: 160px;
  }
  
  #restartBtn {
    grid-column: 2;
    justify-self: center;
  }
  
  #speedLabel {
    grid-column: 3;
    justify-self: end;
    min-width: 160px;
    text-align: right;
  }
 
  #restartBtn {
    pointer-events: auto;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.35);
    color: white;
    font-size: clamp(11px, 3vw, 15px);
    font-weight: 800;
    padding: 6px 16px;
    border-radius: 30px;
    cursor: pointer;
    -webkit-appearance: none;
    backdrop-filter: blur(4px);
    transition: background 0.15s, transform 0.1s;
    display: none;
  }

  #restartBtn:active {
    transform: scale(0.93);
    background: rgba(255,255,255,0.28);
  }

  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,10,40,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    padding: 30px 24px;
    padding-bottom: max(30px, env(safe-area-inset-bottom, 30px));
    z-index: 20;
  }

  #overlay h1 {
    font-size: clamp(2em, 10vw, 3.2em);
    font-family: 'Orbitron', sans-serif;
    margin-bottom: 10px;
    text-shadow: 0 0 30px #00cfff, 0 0 60px #0070ff;
    letter-spacing: 1px;
  }

  #overlay p {
    font-size: clamp(0.95em, 3.5vw, 1.15em);
    color: #a0d8ef;
    margin-bottom: 32px;
    max-width: 520px;
    line-height: 1.6;
  }

  #startBtn {
    background: linear-gradient(135deg, #00cfff, #0070ff);
    border: none;
    color: white;
    font-size: clamp(1.4em,4.5vw,1.8em);
    font-family: 'Encode Sans Condensed', sans-serif;
    font-weight: 800;
    padding: 22px 48px;
    border-radius: 60px;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(0,150,255,0.55);

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    line-height:1.1;
  }

  #startBtn:active {
    transform: scale(0.94);
    box-shadow: 0 2px 12px rgba(0,150,255,0.4);
  }
 
  .boat-emoji {
    display:block;
    font-size:2.2em;
    margin-top:-10px;
    line-height:0.6;
  }
  
  .endscreen-boat-emoji {
    display:block;
    font-size:2.2em;
    margin-top:-10px;
    line-height:0.6;
  }
 
  #score-display {
    font-size: clamp(0.95em, 3.5vw, 1.15em);
    color: #7fffff;
    margin-top: 18px;
    font-weight: 700;
    min-height: 3.8em;
    line-height: 1.45;
  }

  #tapLeft, #tapRight {
    position: absolute;
    bottom: 0;
    width: 50%;
    height: 35%;
    z-index: 5;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: max(20px, env(safe-area-inset-bottom, 20px));
    opacity: 0;
    pointer-events: none;
  }

  #tapLeft { left: 0; }
  #tapRight { right: 0; }

  .tap-hint {
    color: rgba(255,255,255,0.18);
    font-size: clamp(1.8em, 8vw, 3em);
    font-weight: 900;
    pointer-events: none;
  }

  .death-note {
    display: block;
    margin-top: 8px;
    font-size: 0.65em;
    line-height: 1.45;
    color: #c7ebff;
    opacity: 0.95;
  }

  @media (hover: none) and (pointer: coarse) {
    #tapLeft, #tapRight {
      pointer-events: auto;
      opacity: 1;
    }
  }
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="c"></canvas>

  <div id="ui">
    <span id="scoreLabel">Score: 0</span>
    <button id="restartBtn">↺ RESTART</button>
    <span id="speedLabel">Speed: 1.0x</span>
  </div>

  <div id="tapLeft"><span class="tap-hint">◀</span></div>
  <div id="tapRight"><span class="tap-hint">▶</span></div>

  <div id="overlay">
    <h1>🌊 Endless Wave Racer</h1>
    <p>
      Dodge rocks, waves & debris!<br>
      <strong>Mobile:</strong> Swipe left and right on screen<br>
      <strong>Desktop:</strong> Arrow keys ← → or A (left) and D (right)
    </p>
    <button id="startBtn">START  RACE<span class="boat-emoji">🚤</span></button>
    <div id="score-display"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');
const scoreLabel = document.getElementById('scoreLabel');
const speedLabel = document.getElementById('speedLabel');
const scoreDisplay = document.getElementById('score-display');
const overlayTitle = overlay.querySelector('h1');
const overlayText = overlay.querySelector('p');
const tapLeft = document.getElementById('tapLeft');
const tapRight = document.getElementById('tapRight');
const ui = document.getElementById('ui');

// ───────────────── Audio ─────────────────
const bgMusic = new Audio('ewr-game-music.mp3');
bgMusic.loop = true;
bgMusic.preload = 'auto';
bgMusic.volume = 0.55;

const waterLoop = new Audio('ewr-water.mp3');
waterLoop.loop = true;
waterLoop.preload = 'auto';
waterLoop.volume = 0.072;

const crashSfx = new Audio('ewr-crash.mp3');
crashSfx.preload = 'auto';
crashSfx.volume = 0.8;

const restartSfx = new Audio('ewr-all-restarts.mp3');
restartSfx.preload = 'auto';
restartSfx.volume = 0.7;

const moveSfxPool = Array.from({ length: 4 }, () => {
  const a = new Audio('ewr-move.mp3');
  a.preload = 'auto';
  a.volume = 0.1;
  return a;
});
let moveSfxIndex = 0;

function safePlay(audio, restart = false) {
  if (restart) audio.currentTime = 0;
  const playPromise = audio.play();
  if (playPromise && typeof playPromise.catch === 'function') {
    playPromise.catch(() => {});
  }
}

function ensureWaterLoop() {
  if (waterLoop.paused) {
    safePlay(waterLoop);
  }
}

function startGameplayMusic() {
  bgMusic.currentTime = 0;
  safePlay(bgMusic, true);
}

function stopGameplayMusic() {
  bgMusic.pause();
  bgMusic.currentTime = 0;
}

function playCrashSfx() {
  crashSfx.currentTime = 0;
  safePlay(crashSfx, true);
}

function playRestartSfx() {
  restartSfx.currentTime = 0;
  safePlay(restartSfx, true);
}

function playMoveSfx() {
  if (state !== 'playing') return;
  const a = moveSfxPool[moveSfxIndex];
  moveSfxIndex = (moveSfxIndex + 1) % moveSfxPool.length;
  a.currentTime = 0;
  safePlay(a, true);
}

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();

window.addEventListener('resize', () => {
  resize();
  createWaveRows();
  if (state === 'dead') drawDeadScreen();
});

// ───────────────── State ─────────────────
let state = 'idle';
let score = 0;
let highScore = parseInt(localStorage.getItem('wr_hi') || '0', 10);
let bestSpeed = localStorage.getItem('wr_hi_speed');
bestSpeed = bestSpeed !== null ? parseFloat(bestSpeed) : null;
let speed = 1;
let frame = 0;
let playerX = 0, playerY = 0;
let playerLane = 1, targetLane = 1;
let obstacles = [], waveRows = [], particles = [];
let splashParticles = [];
let animId = null;
let lastObstacleFrame = 0;
let frozenScore = 0;
let frozenSpeed = 1;
let deathTimeout = null;
let gameOverHandled = false;
let shake = 0;
let crashPhase = false;
let renderPlayer = true;

// ───────────────── Speed curve ─────────────────
function calcSpeed(s) {
  if (s <= 1500) {
    return 1 + (s / 1500) * 3.0;
  } else {
    return 4.0 + Math.log((s - 1500) / 300 + 1) * 0.28;
  }
}

// ───────────────── Resize / lane ─────────────────
const LANES = 3;
function laneX(lane) {
  return (canvas.width / LANES) * lane + (canvas.width / LANES) / 2;
}

// ───────────────── Draw jet ski ─────────────────
function drawJetSki(x, y, wobble) {
  if (!renderPlayer) return;

  const s = Math.min(canvas.width, canvas.height) / 480;
  ctx.save();
  ctx.translate(x, y + Math.sin(wobble * 0.06) * 3);
  ctx.scale(s, s);

  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(0, 16, 22, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#e03333';
  ctx.beginPath();
  ctx.moveTo(0, -28);
  ctx.bezierCurveTo(14, -10, 18, 4, 16, 12);
  ctx.lineTo(-16, 12);
  ctx.bezierCurveTo(-18, 4, -14, -10, 0, -28);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.fillRect(-6, -18, 12, 5);

  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.ellipse(0, -14, 7, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.arc(0, -22, 7, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = 'rgba(0,200,255,0.5)';
  ctx.beginPath();
  ctx.arc(2, -23, 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = 'rgba(200,240,255,0.65)';
  ctx.beginPath();
  ctx.ellipse(-18, 10, 10, 5, 0.35, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(18, 10, 10, 5, -0.35, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ───────────────── Ocean ─────────────────
function createWaveRows() {
  waveRows = [];
  for (let i = 0; i < 24; i++) {
    waveRows.push({
      y: (canvas.height / 24) * i,
      offset: Math.random() * 200,
      alpha: 0.08 + Math.random() * 0.14
    });
  }
}

function drawOcean() {
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#000d3a');
  grad.addColorStop(0.5, '#001f6e');
  grad.addColorStop(1, '#002d8c');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  waveRows.forEach(row => {
    row.y += speed * 3.2;
    if (row.y > canvas.height + 10) {
      row.y = -12;
      row.offset = Math.random() * 200;
    }

    ctx.strokeStyle = `rgba(100,200,255,${row.alpha})`;
    ctx.lineWidth = 1.8;
    ctx.beginPath();

    for (let x = 0; x <= canvas.width; x += 6) {
      const wy = row.y + Math.sin((x + row.offset + frame * 1.8) * 0.04) * 7;
      x === 0 ? ctx.moveTo(x, wy) : ctx.lineTo(x, wy);
    }

    ctx.stroke();
  });

  ctx.setLineDash([18, 28]);
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1.5;

  for (let l = 1; l < LANES; l++) {
    const lx = (canvas.width / LANES) * l;
    ctx.beginPath();
    ctx.moveTo(lx, 0);
    ctx.lineTo(lx, canvas.height);
    ctx.stroke();
  }

  ctx.setLineDash([]);
}

function drawDeadScreen() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#001a4d';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// ───────────────── Obstacles ─────────────────
const OBSTACLE_TYPES = [
  { type: 'rock',    w: 44, h: 32 },
  { type: 'bigwave', w: 64, h: 28 },
  { type: 'buoy',    w: 24, h: 36 },
  { type: 'log',     w: 70, h: 20 },
  { type: 'barrel',  w: 28, h: 34 },
];

function spawnObstacle() {
  const t = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
  const lane = Math.floor(Math.random() * LANES);
  obstacles.push({ x: laneX(lane), y: -50, lane, wobble: Math.random() * 100, ...t });
}

function drawObstacle(ob) {
  ctx.save();
  ctx.translate(ob.x, ob.y + Math.sin(ob.wobble * 0.04 + frame * 0.04) * 5);

  switch (ob.type) {
    case 'rock': {
      const rg = ctx.createRadialGradient(-4, -4, 2, 0, 0, ob.w / 2);
      rg.addColorStop(0, '#bbb');
      rg.addColorStop(1, '#555');
      ctx.fillStyle = rg;
      ctx.beginPath();
      ctx.ellipse(0, 0, ob.w / 2, ob.h / 2, 0.2, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(0, 0, ob.w / 2, ob.h / 2, 0.2, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.ellipse(-ob.w/6, -ob.h/5, ob.w/6, ob.h/6, 0.4, 0, Math.PI * 2);
      ctx.fill();
      break;
    }

    case 'bigwave': {
      ctx.fillStyle = 'rgba(50,170,255,0.88)';
      ctx.beginPath();
      ctx.moveTo(-ob.w/2, ob.h/2);

      for (let x = -ob.w/2; x <= ob.w/2; x += 3) {
        ctx.lineTo(x, -ob.h/2 + Math.sin((x / ob.w) * Math.PI * 2.5 + frame * 0.12) * 12);
      }

      ctx.lineTo(ob.w/2, ob.h/2);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = 'rgba(200,240,255,0.9)';
      ctx.lineWidth = 2.5;
      ctx.beginPath();

      for (let x = -ob.w/2; x <= ob.w/2; x += 3) {
        const wy = -ob.h/2 + Math.sin((x / ob.w) * Math.PI * 2.5 + frame * 0.12) * 12;
        x === -ob.w/2 ? ctx.moveTo(x, wy) : ctx.lineTo(x, wy);
      }

      ctx.stroke();
      break;
    }

    case 'buoy': {
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.ellipse(0, 2, ob.w/2, ob.h/2.5, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'white';
      ctx.fillRect(-2.5, -ob.h/2, 5, ob.h);

      ctx.fillStyle = '#f00';
      ctx.beginPath();
      ctx.moveTo(2, -ob.h/2 - 2);
      ctx.lineTo(14, -ob.h/2 + 6);
      ctx.lineTo(2, -ob.h/2 + 8);
      ctx.closePath();
      ctx.fill();
      break;
    }

    case 'log': {
      const lg = ctx.createLinearGradient(0, -ob.h/2, 0, ob.h/2);
      lg.addColorStop(0, '#b5651d');
      lg.addColorStop(1, '#6b3a0f');
      ctx.fillStyle = lg;

      ctx.beginPath();
      ctx.ellipse(0, 0, ob.w/2, ob.h/2, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#4a2800';
      ctx.lineWidth = 1.5;

      for (let i = -ob.w/2.5; i <= ob.w/2.5; i += 14) {
        ctx.beginPath();
        ctx.moveTo(i, -ob.h/2 + 2);
        ctx.lineTo(i, ob.h/2 - 2);
        ctx.stroke();
      }
      break;
    }

    case 'barrel': {
      const bg = ctx.createLinearGradient(-ob.w/2, 0, ob.w/2, 0);
      bg.addColorStop(0, '#4a4a4a');
      bg.addColorStop(0.5, '#888');
      bg.addColorStop(1, '#4a4a4a');
      ctx.fillStyle = bg;

      ctx.beginPath();
      ctx.ellipse(0, 0, ob.w/2, ob.h/2, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#ffcc00';
      ctx.lineWidth = 3;

      ctx.beginPath();
      ctx.ellipse(0, -ob.h/4, ob.w/2.2, 4, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.ellipse(0, ob.h/4, ob.w/2.2, 4, 0, 0, Math.PI * 2);
      ctx.stroke();
      break;
    }
  }

  ctx.restore();
}

// ───────────────── Particles ─────────────────
function spawnParticles(x, y) {
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 6;

    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 1,
      life: 1,
      size: 4 + Math.random() * 7,
      color: ['#00cfff', '#ffffff', '#7aefff', '#ffd700', '#ff8800'][Math.floor(Math.random() * 5)]
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0.02);

  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.18;
    p.vx *= 0.97;
    p.life -= 0.028;

    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.globalAlpha = 1;
}

// ───────────────── Crash splash ─────────────────
function spawnSplash(x, y) {
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 6;

    splashParticles.push({
      x,
      y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 2,
      life: 1,
      size: 4 + Math.random() * 6
    });
  }
}

function updateSplash() {
  splashParticles = splashParticles.filter(p => p.life > 0);

  for (const p of splashParticles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.vx *= 0.97;
    p.life -= 0.03;

    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = '#7aefff';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * Math.max(0.05, p.life), 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalAlpha = 1;
}

// ───────────────── Input ─────────────────
function moveLeft() {
  if (state !== 'playing') return;
  const nextLane = Math.max(0, targetLane - 1);
  if (nextLane !== targetLane) {
    targetLane = nextLane;
    playMoveSfx();
  }
}

function moveRight() {
  if (state !== 'playing') return;
  const nextLane = Math.min(LANES - 1, targetLane + 1);
  if (nextLane !== targetLane) {
    targetLane = nextLane;
    playMoveSfx();
  }
}

let touchStartX = null, touchStartY = null;

document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  if (state !== 'playing') return;

  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;

  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 20) {
    dx < 0 ? moveLeft() : moveRight();
  }
}, { passive: true });

tapLeft.addEventListener('touchstart', e => {
  e.stopPropagation();
  moveLeft();
}, { passive: true });

tapRight.addEventListener('touchstart', e => {
  e.stopPropagation();
  moveRight();
}, { passive: true });

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') moveLeft();
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') moveRight();
});

// ───────────────── Collision ─────────────────
function checkCollision(ob) {
  const dx = Math.abs(ob.x - playerX);
  const dy = Math.abs(ob.y - playerY);
  return dx < (ob.w / 2 + 14) && dy < (ob.h / 2 + 18);
}

function triggerCrash() {
  if (crashPhase || state !== 'playing') return;

  crashPhase = true;
  state = 'crashing';
  frozenScore = score;
  frozenSpeed = speed;
  
  stopGameplayMusic();
  playCrashSfx();
  
  speed = 0;
  renderPlayer = false;
  shake = 20;

  spawnParticles(playerX, playerY);
  spawnSplash(playerX, playerY);

  deathTimeout = setTimeout(() => {
    endGame();
  }, 350);
}

// ───────────────── Game loop ─────────────────
function gameLoop() {
  if (state === 'dead' || state === 'idle') return;

  frame++;

  if (state === 'playing') {
    score++;
    speed = calcSpeed(score);
    scoreLabel.textContent = `Score: ${score}`;
    speedLabel.textContent = `Speed: ${speed.toFixed(2)}x`;
  } else if (state === 'crashing') {
    score = frozenScore;
    scoreLabel.textContent = `Score: ${frozenScore}`;
    speedLabel.textContent = `Speed: ${frozenSpeed.toFixed(2)}x`;
  }

  ctx.save();

  if (shake > 0) {
    const dx = (Math.random() - 0.5) * shake;
    const dy = (Math.random() - 0.5) * shake;
    ctx.translate(dx, dy);
    shake *= 0.9;
    if (shake < 0.2) shake = 0;
  }

  drawOcean();

  playerLane += (targetLane - playerLane) * 0.13;
  playerX = laneX(playerLane);
  playerY = canvas.height - Math.max(130, canvas.height * 0.22);

  if (state === 'playing') {
    const interval = Math.max(28, 95 - score / 60);

    if (frame - lastObstacleFrame > interval) {
      spawnObstacle();
      if (score > 400 && Math.random() < 0.3) spawnObstacle();
      lastObstacleFrame = frame;
    }

    for (const ob of obstacles) {
      ob.y += speed * 4.5;
      ob.wobble++;
      drawObstacle(ob);

      if (checkCollision(ob)) {
        triggerCrash();
        break;
      }
    }

    obstacles = obstacles.filter(ob => ob.y < canvas.height + 60);
  } else if (state === 'crashing') {
    for (const ob of obstacles) {
      drawObstacle(ob);
    }
  }

  updateParticles();
  updateSplash();
  drawJetSki(playerX, playerY, frame);

  ctx.restore();

  if (state !== 'dead') {
    animId = requestAnimationFrame(gameLoop);
  }
}

// ───────────────── Start / End ─────────────────
function startGame() {
  clearTimeout(deathTimeout);
  cancelAnimationFrame(animId);

  score = 0;
  speed = 1;
  frame = 0;
  obstacles = [];
  particles = [];
  splashParticles = [];
  targetLane = 1;
  playerLane = 1;
  lastObstacleFrame = 0;
  frozenScore = 0;
  frozenSpeed = 1;
  shake = 0;
  crashPhase = false;
  gameOverHandled = false;
  renderPlayer = true;

  createWaveRows();

  overlayTitle.textContent = '🌊 Endless Wave Racer';
  overlayText.innerHTML = `
    Dodge rocks, waves & debris!<br>
    <strong>Mobile:</strong> Swipe left and right on screen<br>
    <strong>Desktop:</strong> Arrow keys ← → or A (left) and D (right)
  `;
  startBtn.innerHTML = 'START  RACE<span class="boat-emoji">🚤</span>';
  scoreDisplay.textContent = '';

  overlay.style.display = 'none';
  ui.style.display = 'grid';
  restartBtn.style.display = 'block';
  
  ensureWaterLoop();
  playRestartSfx();
  startGameplayMusic();
  
  state = 'playing';
  gameLoop();
}

function endGame() {
  if (gameOverHandled) return;
  gameOverHandled = true;
  state = 'dead';

  clearTimeout(deathTimeout);
  cancelAnimationFrame(animId);
  stopGameplayMusic();

  if (frozenScore > highScore) {
    highScore = frozenScore;
    bestSpeed = frozenSpeed;
    localStorage.setItem('wr_hi', String(highScore));
    localStorage.setItem('wr_hi_speed', String(bestSpeed));
  }

  ui.style.display = 'none';
  restartBtn.style.display = 'none';

  score = frozenScore;
  speed = 0;
  renderPlayer = false;
  obstacles = [];
  particles = [];
  splashParticles = [];

  drawDeadScreen();

  overlayTitle.textContent = '💥 Wiped Out!';
  overlayText.innerHTML = `
  You scored <strong>${frozenScore}</strong> points!<br>
  Speed at crash <strong>${frozenSpeed.toFixed(2)}x</strong>
  `;
  startBtn.innerHTML = 'TRY AGAIN <span class="endscreen-boat-emoji">🚤</span>';

  scoreDisplay.innerHTML = `
    🏆 Best score: ${highScore}<br>
    ⚡ Best speed: ${bestSpeed !== null ? bestSpeed.toFixed(2) + 'x' : '—'}
    <span class="death-note">
      Press F5 (Mac: ⌘ + R) or refresh the page to view controls
    </span>
  `;

  scoreLabel.textContent = `Score: ${frozenScore}`;
  speedLabel.textContent = '';

  overlay.style.display = 'flex';
}

startBtn.addEventListener('click', startGame);
restartBtn.addEventListener('click', startGame);

createWaveRows();
drawDeadScreen();
</script>
